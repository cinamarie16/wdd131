<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WDD 131 | Product Review Form</title>
    <meta name="description" content="WDD 131 week05 assignment to create a product review form.">
    <meta name="author" content="Lucina M. Huff">
    <link rel="stylesheet" href="styles/form.css">
    <link rel="stylesheet" href="styles/form-large.css">
    <script src="scripts/form.js" defer></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,100..900&display=swap" rel="stylesheet">
</head>

<body>
    <header>
        <h1>Product Review</h1>
    </header>

    <form method="get" action="review.html">
        <fieldset>

            <legend>Product Review Form</legend>
            <label for="productSelect" class="labelHeading">Product Name*
                <select name="productSelect" id="productSelect" required>
                    <option value="" disabled selected>Select a Product...</option>
                </select>
            </label>
    
            <div>Overall Rating*</div>
            <label for="1star"><input type="radio" name="rating" id="1star" value="1" required> &star;</label>
            <label for="2star"><input type="radio" name="rating" id="2star" value="2" required> &star;&star;</label>
            <label for="3star"><input type="radio" name="rating" id="3star" value="3" required> &star;&star;&star;</label>
            <label for="4star"><input type="radio" name="rating" id="4star" value="4" required> &star;&star;&star;&star;</label>
            <label for="5star"><input type="radio" name="rating" id="5star" value="5" required> &star;&star;&star;&star;&star;</label>
    
            <label for="installDate" class="labelHeading">Date of Installation* </label>
            <input type="date" name="installDate" id="installDate" required>
    
            <div>Which features did you find useful in the product? (Check all that apply)</div>
            <label for="durability"><input type="checkbox" name="durability" id="durability" value="yes"> Durability</label>
            <label for="ease"><input type="checkbox" name="ease" id="ease" value="yes"> Ease of Use</label>
            <label for="performance"><input type="checkbox" name="performance" id="performance" value="yes"> Performance</label>
            <label for="design"><input type="checkbox" name="design" id="design" value="yes"> Design</label>

    
            <label for="writtenReview" class="labelHeading">Written Review (optional)</label>
            <textarea name="writtenReview" id="writtenReview"></textarea>
    
            <label for="name" class="labelHeading">Your Name (optional) </label>
            <input type="text" name="name" id="name">

            <input type="submit" value="Post Review">
        </fieldset>
    </form>

    <footer>
        <p>&copy;<span id='currentyear'></span> 📔 Lucina M. Huff 📖 Utah</p>
        <p id='lastModified'></p>
    </footer>
</body>
</html>
